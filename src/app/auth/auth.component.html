<div class="min-h-screen bg-zinc-950 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white tracking-tight">BladeOS</h1>
      <p class="mt-2 text-zinc-400 text-sm">
        {{ isLogin() ? 'Acesse sua conta' : 'Crie sua conta' }}
      </p>
    </div>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-xl">

      @if (message()) {
        <div
          class="mb-5 rounded-lg px-4 py-3 text-sm font-medium border"
          [class.bg-red-600/10]="message()!.type === 'error'"
          [class.text-red-400]="message()!.type === 'error'"
          [class.border-red-600/20]="message()!.type === 'error'"
          [class.bg-zinc-800]="message()!.type === 'success'"
          [class.text-zinc-300]="message()!.type === 'success'"
          [class.border-zinc-700]="message()!.type === 'success'"
        >
          {{ message()!.text }}
        </div>
      }

      <form (ngSubmit)="handleSubmit()" #authForm="ngForm">

        @if (!isLogin()) {
          <div class="mb-4">
            <label for="fullName" class="block text-sm font-medium text-zinc-300 mb-1.5">
              Nome completo
            </label>
            <input
              id="fullName"
              type="text"
              name="fullName"
              [(ngModel)]="fullName"
              required
              placeholder="João Silva"
              class="w-full bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
            />
          </div>
        }

        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">
            E-mail
          </label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="voce@exemplo.com"
            class="w-full bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
          />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">
            Senha
          </label>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 text-white placeholder-zinc-500 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent transition"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading() || authForm.invalid"
          class="w-full bg-red-600 hover:bg-red-500 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-zinc-900"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
              </svg>
              Aguarde...
            </span>
          } @else {
            {{ isLogin() ? 'Entrar' : 'Criar conta' }}
          }
        </button>

      </form>

      <div class="mt-6 text-center text-sm text-zinc-500">
        {{ isLogin() ? 'Ainda não tem uma conta?' : 'Já tem uma conta?' }}
        <button
          type="button"
          (click)="toggleMode()"
          class="ml-1 text-red-500 hover:text-red-400 font-medium transition"
        >
          {{ isLogin() ? 'Cadastre-se' : 'Entre aqui' }}
        </button>
      </div>

    </div>
  </div>
</div>
