<!-- Banner -->
<div class="w-full hidden sm:block">
  <img
    src="banner_desktop.png"
    alt="Banner"
    class="w-full max-w-full object-cover"
    style="image-rendering: -webkit-optimize-contrast"
  />
</div>

<div class="w-full sm:hidden">
  <img src="banner.png" alt="Banner" class="w-full object-cover" />
</div>

<!-- Top nav (desktop) -->
<nav class="hidden sm:block bg-zinc-900 border-b border-t border-zinc-800">
  <div class="max-w-5xl mx-auto h-14 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-1">
        <a
          routerLink="/frequencia"
          routerLinkActive="text-white bg-zinc-800"
          class="text-sm text-zinc-400 hover:text-white px-3 py-1.5 rounded-md transition"
        >
          Frequência
        </a>
        <a
          routerLink="/alunos"
          routerLinkActive="text-white bg-zinc-800"
          class="text-sm text-zinc-400 hover:text-white px-3 py-1.5 rounded-md transition"
        >
          Alunos
        </a>
        <a
          routerLink="/configuracoes"
          routerLinkActive="text-white bg-zinc-800"
          class="text-sm text-zinc-400 hover:text-white px-3 py-1.5 rounded-md transition"
        >
          Configurações
        </a>
        <a
          routerLink="/account"
          routerLinkActive="text-white bg-zinc-800"
          class="text-sm text-zinc-400 hover:text-white px-3 py-1.5 rounded-md transition"
        >
          Minha Conta
        </a>
      </div>
    </div>
  </div>
</nav>

      class="flex-1 flex flex-col items-center justify-center gap-1 transition"
    >

        class="h-5 w-5"
        fill="none"
        stroke="currentColor"

        viewBox="0 0 24 24"
